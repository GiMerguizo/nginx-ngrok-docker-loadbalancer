version: '3.8'

networks:
  default:

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    restart: unless-stopped
    depends_on:
      - app1
      - app2
    networks:
      - default

  app1:
    build: ./app
    hostname: app1
    restart: unless-stopped
    networks:
      - default

  app2:
    build: ./app
    hostname: app2
    restart: unless-stopped
    networks:
      - default
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "nginx:80"
    ports:
      - 4040:4040
    depends_on:
      - nginx
    networks:
      - default